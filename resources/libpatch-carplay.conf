# libpatch-carplay.conf — runtime configuration for the CarPlay -> HUD bridge
# (blmjcicarplay).
#
# Deploy this file into the SAME on-device folder as the libpatch-*.so
# libraries (the Android Auto libraries read the separate libpatch.conf in
# this folder; this file is CarPlay-only). It is OPTIONAL — if it is absent,
# or a key is missing, the built-in default (shown below) is used.
#
# Syntax: one "key = value" per line. '#' begins a comment. Whitespace around
# keys and values is ignored. Keys are case-insensitive. Booleans accept
# true/false, 1/0, yes/no, on/off.
#
# A change takes effect the next time jciCARPLAY loads the library — restart
# jciCARPLAY (or reboot) after editing.

# --- Display -----------------------------------------------------------

# Fold Vietnamese street-name letters the HUD font can't render down to the
# nearest form it can. The HUD ECU font has no glyphs for the 3-byte-UTF-8
# precomposed Vietnamese letters (double-stacked diacritics like ề ớ ấ), so
# without this they blank out. When true they are mapped to the renderable
# 2-byte letter (tone dropped, base kept: ề→ê, ớ→ơ, ấ→â) or ASCII where there
# is no 2-byte form. Set false to send names unchanged (a HUD with a full
# Vietnamese font, or a non-Vietnamese locale).
# Default: true
carplay_vn_normalize = true

# --- Speed limit -------------------------------------------------------

# Show the posted speed limit on the HUD. Requires the shared speed-limit
# feed (the splim OCR daemon writing /data_persist/splim, plus carspeed_d for
# the over-speed blink). When false the HUD shows maneuver + distance + road
# name only (the navigation-only setup). When true the maneuver keeps a live
# sign after in-app nav ends, mirroring the Android Auto behaviour.
# Default: false
carplay_speed_limit = false

# Auto-launch the shared speed-limit UDP listener (splim_udpd) from within
# jciCARPLAY. Only acts when carplay_speed_limit = true. Set false on a unit
# where the Android Auto mod already runs splim_udpd, so CarPlay stays a pure
# reader of /data_persist/splim and never starts a second, competing daemon.
# Default: true
carplay_udpd_launch = true

# --- Diagnostics (developer / reverse-engineering aids) ----------------
#
# PRIVACY: the two *_diag dumps write NAVIGATION PAYLOADS — i.e. your
# LOCATION/route data — to plaintext files on the unit, and cause flash
# writes. Leave them OFF for normal use; switch on only for a bench session
# and turn back off afterwards (and delete the logs).

# Dump every decoded nav maneuver/guidance payload (mtype 0x8058/0x8059) to
# /data_persist/nav_diag.log — used to reverse-engineer the field offsets.
# Default: false
carplay_nav_diag = false

# Dump every devmgr message (time/type/size, plus a byte peek of the small
# messages the HUD path skips) to /data_persist/msgtype_diag.log.
# Default: false
carplay_msgtype_diag = false

# Overlay the raw turn codes (EV/S/A) on the HUD street strip whenever the
# turn-icon lookup produced no glyph, so the icon table can be extended.
# Corrupts the normal street display while on — developer aid only.
# Default: false
carplay_hud_debug = false
