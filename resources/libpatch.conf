# libpatch.conf — runtime configuration for the oem-aa-mod libraries.
#
# Deploy this file into the SAME on-device folder as the libpatch-*.so
# libraries. All of them live in one folder and read this one shared
# libpatch.conf at load time. The file is OPTIONAL — if it is absent, or
# a key is missing, the built-in default (shown below) is used.
#
# Syntax: one "key = value" per line. '#' begins a comment. Whitespace
# around keys and values is ignored. Keys are case-insensitive.
#
# This is the common config for the whole libpatch family; not every key
# is meaningful to every library. A library silently ignores keys it
# doesn't use.

# --- blmjciaapa (Android Auto shim) -----------------------------------

# Enable the Android Auto touch-input shim.
# Booleans accept: true/false, 1/0, yes/no, on/off.
# Default: true
touch = true

# Enable HUD guidance forwarding (turn/distance to the head-up display).
# Default: true
hud = true

# Which HUD transport to use when hud = true:
#   svcnavi  - emit GuidanceChangedForHUD to the OEM svcjcinavi service,
#              which becomes the single HUD-frame writer. Required for
#              speed limit display with navigation SD card
#              (svcjcinavi present). (alias: svcjcinavi)
#   vbs      - write the HUD frame directly to com.jci.vbs.navi. Works
#              with no navigation SD card.
# Default: svcnavi
hud_transport = svcnavi

# Fold HUD-unrenderable precomposed Latin letters in street names down to
# their base forms. The HUD ECU font only has glyphs below ~U+0800, so
# any 3-byte-UTF-8 letter blanks out; for precomposed Latin letters (the
# Latin Extended Additional block U+1E00..U+1EFF — a base letter plus
# diacritics) we can fold to the renderable base instead of losing them.
# Samples: ễ→ê, ớ→ơ, ậ→â, ḍ→d, ṛ→r, ẁ→w. A renderable accent is
# kept where the letter is defined by one (ă â ê ô ơ ư); otherwise the
# plain letter is used. So a name the font shows as "Nguy n Phư c" reads
# "Nguyên Phươc". Affects only the HUD street strip; everything else
# (ASCII, the already-renderable ă â ê ô ơ ư đ, and non-Latin >=U+0800
# text like CJK/Thai — which has no Latin base and stays blank) is
# untouched. When false, names are sent unchanged.
# Default: true
hud_fold_latin = true

# When the user presses mute, send Android Auto a media PAUSE so the phone
# stops streaming (podcast/audiobook/music) instead of playing on silently
# behind a muted amp; send a media PLAY on unmute to resume. Only acts while
# Android Auto media is the active audio source, and only resumes what it
# paused. Watches the OEM audio manager's own mute state
# (com.jci.vbs.am / EntertainmentMuteStatus), so it tracks exactly the mute
# the on-screen mute indicator shows.
# Default: true
mute_pauses_phone = true

# Block every MEDIA_PLAY command generated by the CMU for Android Auto,
# including startup restore, source activation, and focus regain. The
# play/pause bridge's own unmute resume remains allowed. Android Auto stays
# selected and connects normally; playback can still be started from the
# projected interface, Assistant, or phone-side controls.
# Default: false (stock behavior)
block_headunit_media_play = true

# --- svcjcinavi (HUD merge for OEM nav coexistence) -------------------

# Force the Android Auto street name onto the HUD street strip even in
# markets/firmware where the OEM nav service blanks it (e.g. EU head-up
# display types that suppress the street line). When true, the merge
# shim reads the real street from the OEM's own current_StreetName buffer
# and rewrites the strip with it. When false, the OEM's native street
# handling is left untouched (the street shows only where the OEM would
# show it). Has no effect on the maneuver arrow or distance.
# Default: false
force_street_name = false

# --- aap_service (Android Auto 1.6 navigation -> HUD) -----------------

# Advertise Android Auto GAL 1.6 to the phone instead of the OEM's 1.5.
# At 1.5 the phone only sends the deprecated turn events; at 1.6 it sends
# the full navigation protocol (maneuver, lanes, distance, ETA), which the
# aap_service shim decodes and feeds to the HUD (via the hud / hud_transport
# keys above).
#
# Requires libpatch-aap_service.so to be deployed and LD_PRELOAD'd into the
# aap_service process (see the install docs). This key has NO effect unless
# that shim is loaded — the other libraries ignore it.
#
# The GAL version is negotiated once per session, so a change takes effect on
# the next Android Auto connection (restart jciAAPA or reconnect the phone).
# When false the shim is inert and the unit behaves stock.
# Default: false
use_protocol_v1_6 = true
